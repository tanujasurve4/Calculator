<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Scientific Calculator</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial;
    background: linear-gradient(135deg, #141e30, #243b55);
}

/* Calculator Card */
.calculator{
    width:300px;
    padding:20px;
    border-radius:25px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    border:1px solid rgba(255,255,255,0.2);
}

/* Screen */
#screen{
    width:100%;
    height:75px;
    font-size:32px;
    border:none;
    outline:none;
    text-align:right;
    padding-right:10px;
    border-radius:15px;
    background: rgba(255,255,255,0.15);
    color:#fff;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

/* Buttons Grid */
.buttons{
    margin-top:18px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

/* Base Button */
button{
    height:50px;
    font-size:16px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background: rgba(255,255,255,0.12);
    color:#fff;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
    background: rgba(255,255,255,0.25);
}

/* Special Buttons */
.op{ background:#4dabf7; }
.clear{ background:#51cf66; }
.del{ background:#ff6b6b; }
.equal{
    grid-column:span 2;
    background: linear-gradient(45deg,#ff922b,#ff6b6b);
    font-weight:bold;
}
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="screen" placeholder="0" readonly>

    <div class="buttons">

        <button class="clear" onclick="clr()">AC</button>
        <button class="del" onclick="del()">DEL</button>
        <button onclick="insert('%')">%</button>
        <button class="op" onclick="calculate()">=</button>

        <button onclick="sin()">sin</button>
        <button onclick="cos()">cos</button>
        <button onclick="tan()">tan</button>
        <button onclick="sqrt()">√</button>

        <button onclick="insert('7')">7</button>
        <button onclick="insert('8')">8</button>
        <button onclick="insert('9')">9</button>
        <button onclick="insert('/')">÷</button>

        <button onclick="insert('4')">4</button>
        <button onclick="insert('5')">5</button>
        <button onclick="insert('6')">6</button>
        <button onclick="insert('*')">×</button>

        <button onclick="insert('1')">1</button>
        <button onclick="insert('2')">2</button>
        <button onclick="insert('3')">3</button>
        <button onclick="insert('-')">−</button>

        <button onclick="insert('0')">0</button>
        <button onclick="insert('.')">.</button>
        <button onclick="pow()">xʸ</button>
        <button onclick="insert('+')">+</button>

        <button onclick="log10()">log</button>
        <button onclick="ln()">ln</button>
        <button onclick="pi()">π</button>
        <button onclick="e()">e</button>

        <button onclick="square()">x²</button>
        <button onclick="fact()">x!</button>
        <button onclick="insert('(')">(</button>
        <button onclick="insert(')')">)</button>

    </div>
</div>

<script>
let screen = document.getElementById("screen");

function insert(val){ screen.value += val; }
function clr(){ screen.value = ""; }
function del(){ screen.value = screen.value.slice(0,-1); }

function calculate(){
    try{ screen.value = eval(screen.value); }
    catch{ screen.value = "Error"; }
}

/* Trigonometry */
function sin(){ screen.value = Math.sin(screen.value*Math.PI/180); }
function cos(){ screen.value = Math.cos(screen.value*Math.PI/180); }
function tan(){ screen.value = Math.tan(screen.value*Math.PI/180); }

function sqrt(){ screen.value = Math.sqrt(screen.value); }
function square(){ screen.value = Math.pow(screen.value,2); }

function pow(){
    let base = screen.value;
    let exp = prompt("Enter power:");
    if(exp !== null) screen.value = Math.pow(base, exp);
}

function log10(){ screen.value = Math.log10(screen.value); }
function ln(){ screen.value = Math.log(screen.value); }
function pi(){ screen.value = Math.PI; }
function e(){ screen.value = Math.E; }

function fact(){
    let n = Number(screen.value);
    if(n < 0){ screen.value = "Error"; return; }
    let f = 1;
    for(let i=1;i<=n;i++) f *= i;
    screen.value = f;
}
</script>

</body>
</html>
